<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: store the FULL path and redirect to index.html
      var fullPath = location.pathname + location.search + location.hash;
      sessionStorage.setItem('spa_redirect', fullPath);
      // Redirect to the repo root (first path segment)
      var repo = location.pathname.split('/')[1];
      location.replace('/' + repo + '/');
    </script>
  </head>
  <body></body>
</html>
