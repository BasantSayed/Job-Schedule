<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // GitHub Pages SPA redirect: encode the path and redirect to index.html
      const repo = location.pathname.split('/')[1];
      const path = location.pathname.slice(1 + repo.length) + location.search + location.hash;
      sessionStorage.setItem('spa_redirect', path || '/');
      location.replace('/' + repo + '/');
    </script>
  </head>
  <body></body>
</html>
